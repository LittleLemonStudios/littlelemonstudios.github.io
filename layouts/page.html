{{ define "main" }}
<article>
  <div class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      {{ $dateMachine := .Date | time.Format "2006-01-02T15:04:05-07:00" }}
      {{ $dateHuman := .Date | time.Format ":date_long" }}
      <time class="post-date" datetime="{{ $dateMachine }}">{{ $dateHuman }}</time>
    </div>
    {{ partial "tags.html" . }}
  </div>
  {{ .Content }}
</article>
{{ end }}
