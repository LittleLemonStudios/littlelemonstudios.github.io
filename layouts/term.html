{{ define "main" }}

<h1>{{ .Title }}</h1>

<ul class="post-list">
  {{ range .Pages }}
  <li class="post-item">
    <a href="{{ .Permalink }}" class="post-item-title">{{ .Title }}</a>
    <time class="post-date">{{ .Date.Format "2 January 2006" }}</time>
    {{ with .Params.description }}
    <p class="post-description">{{ . }}</p>
    {{ end }}
    {{ partial "tags.html" . }}
  </li>
  {{ end }}
</ul>
{{ end }}
